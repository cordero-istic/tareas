<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">

        <!-- ========== ENCABEZADO ========== -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">
                    <span class="title-icon">📋</span>
                    Task Manager
                </h1>
                <p class="app-subtitle">Organiza tu día de forma eficiente</p>
            </div>
            <div class="date-display" id="dateDisplay"></div>
        </header>

        <!-- ========== ESTADÍSTICAS ========== -->
        <section class="stats-bar">
            <div class="stat-card">
                <span class="stat-number" id="totalTasks">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-card stat-pending">
                <span class="stat-number" id="pendingTasks">0</span>
                <span class="stat-label">Pendientes</span>
            </div>
            <div class="stat-card stat-completed">
                <span class="stat-number" id="completedTasks">0</span>
                <span class="stat-label">Completadas</span>
            </div>
        </section>

        <!-- ========== FORMULARIO ========== -->
        <section class="task-form-section">
            <form class="task-form" id="taskForm">
                <div class="form-row">
                    <div class="form-group input-group">
                        <label for="taskInput">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                            </svg>
                            Nueva tarea
                        </label>
                        <input 
                            type="text" 
                            id="taskInput" 
                            placeholder="¿Qué necesitas hacer?" 
                            autocomplete="off"
                            maxlength="150"
                        >
                    </div>

                    <div class="form-group select-group">
                        <label for="prioritySelect">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
                                <line x1="4" y1="22" x2="4" y2="15"/>
                            </svg>
                            Prioridad
                        </label>
                        <select id="prioritySelect">
                            <option value="low">🟢 Baja</option>
                            <option value="medium" selected>🟡 Media</option>
                            <option value="high">🔴 Alta</option>
                        </select>
                    </div>

                    <div class="form-group select-group">
                        <label for="categorySelect">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="7" height="7"/>
                                <rect x="14" y="3" width="7" height="7"/>
                                <rect x="14" y="14" width="7" height="7"/>
                                <rect x="3" y="14" width="7" height="7"/>
                            </svg>
                            Categoría
                        </label>
                        <select id="categorySelect">
                            <option value="personal">👤 Personal</option>
                            <option value="work">💼 Trabajo</option>
                            <option value="study">📚 Estudio</option>
                            <option value="health">🏥 Salud</option>
                            <option value="other">📌 Otro</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group input-group">
                        <label for="dueDateInput">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                            Fecha límite
                        </label>
                        <input type="date" id="dueDateInput">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="addBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            Agregar
                        </button>
                        <button type="button" class="btn btn-secondary" id="clearCompletedBtn" title="Limpiar completadas">
                            🗑️ Limpiar
                        </button>
                    </div>
                </div>
            </form>
        </section>

        <!-- ========== FILTROS ========== -->
        <section class="filters-section">
            <div class="filter-tabs" id="filterTabs">
                <button class="filter-tab active" data-filter="all">
                    Todas <span class="filter-count" id="countAll">0</span>
                </button>
                <button class="filter-tab" data-filter="pending">
                    Pendientes <span class="filter-count" id="countPending">0</span>
                </button>
                <button class="filter-tab" data-filter="completed">
                    Completadas <span class="filter-count" id="countCompleted">0</span>
                </button>
            </div>

            <div class="sort-section">
                <label for="sortSelect">Ordenar:</label>
                <select id="sortSelect">
                    <option value="date-desc">Más recientes</option>
                    <option value="date-asc">Más antiguas</option>
                    <option value="priority">Prioridad</option>
                    <option value="alpha">Alfabético</option>
                    <option value="due-date">Fecha límite</option>
                </select>
            </div>
        </section>

        <!-- ========== BARRA DE BÚSQUEDA ========== -->
        <section class="search-section">
            <div class="search-box">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Buscar tareas...">
            </div>
        </section>

        <!-- ========== LISTA DE TAREAS ========== -->
        <section class="task-list-section">
            <ul class="task-list" id="taskList">
                <!-- Las tareas se renderizan aquí dinámicamente -->
            </ul>

            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📝</div>
                <h3>No hay tareas aún</h3>
                <p>Agrega tu primera tarea para comenzar a organizarte</p>
            </div>
        </section>

        <!-- ========== PIE DE PÁGINA ========== -->
        <footer class="app-footer">
            <p>Hecho con ❤️ — Task Manager &copy; 2026</p>
        </footer>

    </div>

    <!-- ========== MODAL DE EDICIÓN ========== -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h2>✏️ Editar Tarea</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="editTaskInput">Nombre de la tarea</label>
                    <input type="text" id="editTaskInput" maxlength="150">
                </div>
                <div class="form-group">
                    <label for="editPrioritySelect">Prioridad</label>
                    <select id="editPrioritySelect">
                        <option value="low">🟢 Baja</option>
                        <option value="medium">🟡 Media</option>
                        <option value="high">🔴 Alta</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editCategorySelect">Categoría</label>
                    <select id="editCategorySelect">
                        <option value="personal">👤 Personal</option>
                        <option value="work">💼 Trabajo</option>
                        <option value="study">📚 Estudio</option>
                        <option value="health">🏥 Salud</option>
                        <option value="other">📌 Otro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editDueDateInput">Fecha límite</label>
                    <input type="date" id="editDueDateInput">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="editCancelBtn">Cancelar</button>
                <button class="btn btn-primary" id="editSaveBtn">Guardar cambios</button>
            </div>
        </div>
    </div>

    <!-- ========== NOTIFICACIÓN ========== -->
    <div class="notification" id="notification"></div>

    <script src="app.js"></script>
</body>
</html>
